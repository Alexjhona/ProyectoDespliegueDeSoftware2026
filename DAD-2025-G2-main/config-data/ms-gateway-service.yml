server:
  port: ${PORT:${SERVERS_PORT:8080}}

logging:
  level:
    root: info
    org.springframework.cloud.gateway: debug
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: info

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedHeaders: "*"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"

      discovery:
        locator:
          enabled: true

      routes:
        - id: ms-auth-service
          uri: lb://ms-auth-service
          predicates:
            - Path=/auth/**

        - id: ms-cliente-service
          uri: lb://ms-cliente-service
          predicates:
            - Path=/api/clientes/**
          filters:
            - AuthFilter

        - id: ms-categoria-service
          uri: lb://ms-categoria-service
          predicates:
            - Path=/api/categorias/**
          filters:
            - AuthFilter

        - id: ms-proveedor-service
          uri: lb://ms-proveedor-service
          predicates:
            - Path=/api/proveedores/**
          filters:
            - AuthFilter

        - id: ms-compra-service
          uri: lb://ms-compra-service
          predicates:
            - Path=/api/compras/**
          filters:
            - AuthFilter

        - id: ms-inventario-service
          uri: lb://ms-inventario-service
          predicates:
            - Path=/api/stock/**
          filters:
            - AuthFilter

        - id: ms-producto-service
          uri: lb://ms-producto-service
          predicates:
            - Path=/api/productos/**
          filters:
            - AuthFilter

        - id: ms-venta-service
          uri: lb://ms-venta-service
          predicates:
            - Path=/api/ventas/**
          filters:
            - AuthFilter

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8090/eureka}
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}