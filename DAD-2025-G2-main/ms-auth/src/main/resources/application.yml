server:
  port: 8085

spring:
  application:
    name: ms-auth-service

  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: mi_clave_jwt_segura_2026_auth
  expiration: 3600000

eureka:
  client:
    enabled: false